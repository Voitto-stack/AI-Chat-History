syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.pserver.proto.archat";
option java_outer_classname = "RoomDemoServiceProtoDemo";

// Unity/C# 命名空间
option csharp_namespace = "Room";

package RoomServiceProto;

message PingRequest {
  string key1 = 1;
  int32 key2 = 2;
}

message PingResponse {
  string key1 = 1;
  int32 key2 = 2;
}

message Test {}