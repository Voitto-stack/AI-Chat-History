syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.pserver.proto.grpc";

package common;

enum CommonCode {
  SUCCESS = 0;

  AUTH_FAILED = 97;
  FAIL_PARAMETER_ERROR = 98;
  FAIL_UNKNOWN = 99;
}

enum AvatarType {
  // 自有人物模型
  SELF = 0;
  // ReadyPlayerMe 生成的人物模型
  RPM = 1;
}

enum ModerationContentType {
  // POST
  POST = 0;
  COMMENT = 1;
  CUSTOM_AVATAR = 2;
}
