syntax = "proto3";

package UserServiceProto;

import "archat_api/post_api.proto";

// Unity/C# namespace
option csharp_namespace = "UserServiceApi";
option java_multiple_files = true;
option java_outer_classname = "UserServiceProto";
option java_package = "com.pserver.proto.archat";

// ========== ! ! ! WARNING ! ! ! ===========
// Make sure you are not adding protos into the
// deprecated block (started from L1450)

enum UserRegulationStatus {
  Active = 0;
  KGroup = 1;
  Banned = 2;
  Admin = 3;
  Collaborator = 4;
  Suspended = 5;
  Reported = 6; // reported by another user in human chat
}

// https://presence.feishu.cn/docx/Sbxddtcgzo6kSHx9DaIc5P3fn1b
// 蜜罐需求引入的概念
enum ProductLevel {
  ProductLevelNone = 0;
  LowAge = 1;
  ChinaSim = 2;
  PotentialCompetitor = 3;
  FullFunction = 4;
}

enum ThirdPartyLoginUser {
  TestUser = 0;
  iOS = 1;
  Android = 2;
  Null = 3; // for legacy code
  Local = 4; // for k-server
  iOSGuest = 5;
  AndroidGuest = 6;
}

enum ClientType {
  TYPE_UNKNOWN = 0;
  IOS = 1;
  ANDROID = 2;
  PC = 3;
}

enum Relationship {
  Unknown = 0;
  Stranger = 1;
  Following = 2;
  Follower = 3;
  Friend = 4;
  Blocked = 5;
  NoUser = 6;
  Self = 7;
  BlockedBy = 8; // 被别人block
  BlockedTwoWay = 9; // 双向block
}

// post /userApi/updateProfileImage
message UploadPicture {
  string name = 1;
  bytes file = 2;
}

enum PictureState {
  PICTURE_NORMAL = 0;
  PICTURE_BANNED = 1;
  PICTURE_SUSPICIOUS = 2;
  PICTURE_EMPTY = 3;
}

message PictureInQuery {
  string url = 1;
  int32 width = 2;
  int32 height = 3;
  string minUrl = 4;
  int32 min_width = 5;
  int32 min_height = 6;
  string mid_url = 7;
  int32 mid_width = 8;
  int32 mid_height = 9;
  PictureState state = 20;
}

// post /userApi/loginUser
message LoginUserRequest {
  string third_party_login_user_id = 1;
  ThirdPartyLoginUser platform = 2;
  string device_id = 3; // optional
}

message LoginUserResponse {
  bool is_new_user = 1;
  GetUserInfoResponse userinfo = 2;
  string token = 3;
  string tim_usersig = 4;
  PostLoginAction post_login_action = 5;
  UserServiceCommonCode code = 6;
  int64 next_token_refresh_time = 7;
  int32 balance = 10;
}

// post /userApi/fastLogin
message FastLoginRequest {
  string device_id = 1; // mandatory
  int32 user_id = 2; // optional
  string third_party_login_user_id = 3; // optional
  ThirdPartyLoginUser platform = 4; // optional
  string referral_code = 5; // optional, invite code for BFF relationship
}

message FastLoginResponse {
  UserInfo user_info = 1; // backfilled user
  CaiAccount cai_account = 2; // registed or unregisted
  string token = 3; // jwt
  string tim_usersig = 4; // tencent tim
  UserServiceCommonCode code = 5;
  int64 next_token_refresh_time = 6;
}

message UserInfo {
  int32 user_id = 1;
  string avatar_url = 2;
  string username = 3;
  string bio = 4;
  int32 age = 5;
  Gender gender = 6;
  ProductLevel product_level = 7;
  string nickname = 8;
  int32 created_days = 9;
  UserStatus user_status = 10; // optional
  int32 balance = 11;
  bool pending = 12;
  UserType user_type = 13;
  string profession = 14;
  UserGeoLocation geo_location = 15;
  string bot_id = 16;
  PictureInQuery custom_avatar = 17;
  string user_source = 18;
  repeated PostServiceProto.PostPictureInQuery post_pictures = 19;
  repeated InterestTab interest_tabs = 20;
  bool is_online = 21;
  ProfileImage profile_image = 22;
  int32 post_count = 23;
  int64 last_active_time = 24;
  string education = 25;
  bool is_vip = 26;
  string phone_number = 27;
  PictureInQuery selfie = 28;
  Race race = 29;
  string tim_usersig = 30;
  string beautified_avatar = 31;
  int32 sus_bot = 32;
  bool trigger_match = 33; // 这个默认只有match feed有
  UserFromType userFromType = 34; // 用户来源类型
  int32 appType = 35; // 用户app类型
  bool isFaceVerified = 36; // 用户人脸是否校验 - 其他所有拉取用户信息的接口都带改字段
  bool isPaid = 37; // 用户是否支付过
  int32 faceScore = 38; // 用户颜值分
  int32 height = 39;
  string birthday = 40;
  bool isVideoTest = 41; // pwa用户是否是视频测试用户, 否就是 文字
  string score = 42;
  string invitationCode = 43; // 工会邀请码
  string emoji_avatar = 44; // 用户的emoji头像
  string emoji_avatar_grey = 45; // 用户的emoji grey头像
  string ins_id = 46; // 用户INS id
  string ins_avatar = 47; // 用户INS头像
  string emoji_avatar_work = 48; // 用户的emoji work头像
  bool is_ins_pwa = 49; // 用户是否是INS PWA用户
  bool is_club_user = 50; // 是否为主播
  int64 call_pwa_time = 51; //拨打pwa忙线时间
  int32 call_order_rank = 52; //视频等级
  bool is_eliminated_xiaoli = 53; // 是否是被淘汰的小利女
  bool is_official = 54; // 是否是官方账号
  UserThirdPartyLoginState user_third_party_login_state = 55; //是否已授权google登陆
  int64 created_at = 56;
}

enum UserThirdPartyLoginState {
  //0:未授权google；1:已授权google登陆
  USER_UNAUTHORIZED = 0;
  USER_AUTHORIZED = 1;
}

enum UserFromType {
  USER_FROM_TYPE_UNSPECIFIED = 0;
  USER_FROM_TYPE_PWA = 1;
}

enum Race {
  unrecognized = 0;
  white = 1;
  black = 2;
  hispanic = 3;
  asian = 4;
  non_black = 5;
  brown = 6;
}

enum PostLoginAction {
  NONE = 0;
  NEED_TO_DETECT_FACE = 1;
  NEED_TO_UPLOAD_PICTURE = 2;
  GET_RELEASE_TIME = 3;
}

