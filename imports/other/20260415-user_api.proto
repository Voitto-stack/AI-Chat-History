//S2S 支付执行请求 (前端内部收银台 -> 后端)
message ExecutePaymentRequest {
  string order_id = 1; // 业务订单号
  string provider = 2;
  // 支付要素 (注意传输安全 HTTPS)
  string card_number = 3;
  string expiry_month = 4;
  string expiry_year = 5;
  string cvc = 6;
  string card_first_name = 7; // 账单姓氏
  string card_last_name = 8; // 账单名字

  // 账单地址 (S2S 必填)
  string email = 9; //账单邮箱
  string country_code = 10; // ISO 2位代码, e.g. "US"
  string state = 11; //州或省代码（如 ISO 3166-2中定义）。例如，美国的 CA
  string city = 12; //账单城市
  string street = 13; //账单街道
  string zip_code = 14; //账单邮政编码美国的地址最多为五位数字，其他国家的地址最多为十个字符
  string phone = 15; //账单电话
}

// S2S 支付响应
message ExecutePaymentResponse {
  int32 code = 1;
  string message = 2;

  // 支付状态: SUCCESS, FAILED, REQUIRE_3DS
  string status = 3;

  // 如果需要 3DS 验证，这里返回银行页面 URL
  string redirect_url = 4;

  // 回显订单信息，方便前端展示结果页
  string order_id = 5;
  string currency = 6; // 币种，例如 "USD"
  string price = 7; // 价格，建议使用 string 传输 (e.g. "3.99") 保证精度
  string provider_tx_id = 8; //  渠道流水号，方便前端排查问题
}

