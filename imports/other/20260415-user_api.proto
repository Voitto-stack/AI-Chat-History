  double dtc_message_coins_original_price = 5;

  // 现价 (原: dtc_message_coins_current_price)
  double dtc_message_coins_current_price = 6;

  // 优惠比例 (原: dtc_message_coins_extra_percentage)
  double dtc_message_coins_extra_percentage = 7;

  // 限时倒计时(秒) (原: dtc_message_coins_count_down_time)
  int32 dtc_message_coins_count_down_time = 8;

  // 三方 Channel (原: dtc_message_coins_pay_channel)
  string dtc_message_coins_pay_channel = 9;

  // 三方 Router (原: dtc_message_coins_pay_router)
  repeated string dtc_message_coins_pay_router = 10;

  // 触发时间点 (原: dtc_message_coins_trigger_time，例如 20:00)
  string dtc_message_coins_trigger_time = 11;

  // 是否触发 Push (原: is_dtc_message_coins_push, 0或1)
  bool is_dtc_message_coins_push = 12;

