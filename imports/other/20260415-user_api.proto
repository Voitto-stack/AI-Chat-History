// 请求
message AdminGetActionCountsInRangeRequest {
  string start_time = 1; // 开始时间，格式：2024-07-16T00:00:00Z (ISO 8601)
  string end_time = 2; // 结束时间，格式：2024-07-16T23:59:59Z (ISO 8601)
  ActionType type = 3; // 行为类型：PAID 或 REFUND
}

// 单个时间点的行为数量快照
message ActionCountSnapshot {
  string timestamp = 1; // 时间戳，格式：2024-07-16T00:00:00Z (ISO 8601)
  int32 total_count = 2; // 该时间点的总数（付费用户总数或总退款数）
  int32 increased_count = 3; // 该时间点新增的数量（新增付费用户数或新增退款数）
}

// 响应
message AdminGetActionCountsInRangeResponse {
  UserServiceCommonCode code = 1;
  string message = 2;
  // 在请求的时间范围内，每个小时的行为数量快照
  repeated ActionCountSnapshot action_count_snapshots = 3;
}

// 行为类型枚举
enum ActionType {
  PAID = 0;
  RENEW = 1;
  REFUND = 2;
  EXPIRE = 3;
}

// 请求
message AdminGetActionUserListInRangeRequest {
  string start_time = 1; // 开始时间，格式：2024-07-16T00:00:00Z (ISO 8601)
  string end_time = 2; // 结束时间，格式：2024-07-16T23:59:59Z (ISO 8601)
  ActionType type = 3; // 行为类型：PAID 或 REFUND
  int32 cursor = 4;
  int32 page_size = 5;
  int32 sort_key = 6; // 0 = Created_at, 1 = Updated_at
  int32 app_name = 7; // 对应userinfo里的app_name
}

// 响应
message AdminGetActionUserListInRangeResponse {
  UserServiceCommonCode code = 1;
  string message = 2;
  repeated AdminUserSubscriptionInfo action_user_list = 3; // 时间范围内的行为用户列表（付费或退款）
  int32 next_cursor = 4;
  int32 total_count = 5;
}

message AdminUserSubscriptionInfo {
  AdminUserInfo user_info = 1;
  int32 user_id = 2;
  string purchase_date = 3;
  ActionType action_type = 4;
  string ios_product_id = 5;
  double amount = 6;
  string ios_key_id = 7;
  string ios_bundle_id = 8;
  string ios_transaction_id = 9;
  string ios_original_transaction_id = 10;
  string updated_at = 11;
  string expire_date = 12;
  string android_package_name = 13;
  string android_product_id = 14;
  string payment_provider = 15; // 支付渠道：Google Pay，Apple Pay，Waffo
  string payment_method = 16; // 第三方支付的支付方式：GOOGLEPAY，APPLEPAY，VISA_CREDITCARD
}

message AdminGetPwaActionUserListInRangeRequest {
  int64 start_time = 1; // 开始时间戳（ms）
  int64 end_time = 2; // 结束时间戳（ms）
  int32 cursor = 3;
  int32 page_size = 4;
  int32 sort_key = 5; // 0 = Created_at, 1 = Updated_at
}

