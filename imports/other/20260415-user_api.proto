// =============  start bot 相关 分界线 ============
message Bot {
  int32 user_id = 1;
  string bot_id = 2;
  string title = 3;
  string greeting = 4;
  string original_avatar_url = 5;
  string avatar_url = 6;
  string visibility = 7;
  string participant_name = 8;
  string user_username = 14;
  string bot_tag = 15;
  int32 priority = 16;
  int32 sort = 17;
  string ip = 18;
  string category = 19;
  string title_new = 20;
  int64 participant_num_interactions = 21;
  string chat_url = 22;
}

message GetBotTagsRequest {
  int32 offset = 1;
  int32 limit = 2; // 雅典娜专用
  ClientType client_type = 4;
  string app_version = 5;
}

message GetBotTagsResponse {
  repeated BotTag tags = 1;
  int32 next_offset = 2;
  int32 total = 3;
  UserServiceCommonCode code = 4;
  string message = 5; // if fail
}

message BotTag {
  int32 id = 1;
  string name = 2;
  int32 sort = 3;
}

message SendMessageFromBotRequest {
  int32 from_id = 1;
  int32 to_id = 2;
  string content = 3;
  string custom_data = 4;
  int32 push_flag = 5; // 0 - 推送； 1 - 不推送
  TimMessageType message_type = 6;
  string custom_desc_type = 7;
  OfflinePushInfo OfflinePushInfo = 8;
  int32 OnlineOnlyFlag = 9;
  repeated string SendMsgControl = 10;
}

enum TimMessageType {
  TIMTextElem = 0;
  TIMGifElem = 1;
  TIMCustomElem = 2;
  TIMImageElem = 3;
  TIMSoundElem = 4;
}

message OfflinePushInfo {
  int32 PushFlag = 1;
  string Title = 2;
  string Desc = 3;
  string Ext = 4;
  AndroidInfo AndroidInfo = 5;
  ApnsInfo ApnsInfo = 6;
}

message AndroidInfo {
  string Sound = 1;
  string OPPOChannelID = 2;
  int32 VIVOClassification = 3;
  string HuaWeiImage = 4;
  string HonorImage = 5;
  string GoogleImage = 6;
}

message ApnsInfo {
  string Sound = 1;
  int32 BadgeMode = 2;
  string Title = 3;
  string SubTitle = 4;
  string Image = 5;
  int32 MutableContent = 6;
  string ext = 7;
}

message SendMessageFromBotResponse {
  UserServiceCommonCode code = 1;
  string message = 2; // if fail
  int32 count = 3;
}

message GetTempEmailMessageRequest {
  string email = 1;
  bool force_refresh = 2;
}

message GetTempEmailMessageResponse {
  UserServiceCommonCode code = 1;
  string message = 2;
  string email_message = 3;
}

enum CaiAccountState {
  UNKNOWN = 0;
  Registered = 1;
  NotRegistered = 2;
  StateSignUpSubmitted = 3;
  StateConfirmationUrlSent = 4;
  StateVerified = 5;
  Invalid = 6;
}

message CaiAccount {
  CaiAccountState state = 1;
  int32 user_id = 2;
  string email = 3;
  string password = 4;
  int32 id = 5;
  string cai_username = 6;
  string third_party_login_user_id = 10;
  ThirdPartyLoginUser platform = 11;
  string confirm_url = 12;
  int32 available_cai_account_id = 13;
  string cookie = 14;
  string user_agent = 15;
}

message AddRegisteredCaiAccountRequest {
  CaiAccount account = 1;
