// ------------- digital human -------------
// CreatePost
message AdminCreatePostRequest {
  string               client_token = 1;
  string               content = 2;
  repeated PostPicture pictures = 3;
  int32                user_id = 4;
  int64                created_at = 5;
  repeated PostPictureInQuery picturesInQuery = 6;
}

message AdminCreatePostResponse {
  CreatePostResult code = 1;
  string           message = 2; // if fail
  Post             post = 3;
}

message AdminEditPostRequest {
  int64                post_id = 1;
  string               content = 2;
  repeated PostPicture pictures = 3;
  int32                user_id = 4;
  int64                created_at = 5;
}

message AdminEditPostResponse {
  CreatePostResult code = 1;
  string           message = 2; // if fail
  Post             post = 3;
}

// LikePost
message AdminDigitalHumanLikePostRequest {
  int64 post_id = 1;
  int32 user_id = 2;
}

message AdminDigitalHumanLikePostResponse {
  PostServiceCommonCode code = 1;
  string                message = 2;
  int32                 like_count = 3;
}

message AdminCreatePostCommentRequest {
  int64           post_id = 1;
  int64           parent_id = 2;
  int64           reply_id = 3;
  string          content = 4;
  PostCommentType type = 5;
  int32           user_id = 6;
}

message AdminCreatePostCommentResponse {
  PostServiceCommonCode code = 1;
  PostComment           comment = 2;
}

// =================== Feed ===================

message GetPostFeedRequest {
  int32 limit = 1;
  int64 offset = 2;
}

message GetPostFeedResponse {
  PostServiceCommonCode code = 1;
  string                message = 2;
  repeated Post         posts = 3;
  int64                 next_offset = 4;
}

message GetPostDetailRequest {
  int64 post_id = 1;
}

message GetPostDetailResponse {
  PostServiceCommonCode code = 1;
  string                message = 2;
  Post                  post = 3;
}

message AdminDeletePostRequest {
  int64 post_id = 1;
}

message AdminDeletePostResponse {
  PostServiceCommonCode code = 1;
  string                message = 2;
}

// 前端新架构 - 发帖图片自动生成文案
message PostSuggestedContentRequest {
  repeated PostPicture pictures = 1; // 用户图片
  int64 timezone_offset_minutes = 2; // 用户本地时区偏移（分钟），用于“早晨/夜晚”等文案语境
}

message PostSuggestedContentResponse {
  PostServiceCommonCode code = 1;
  string message = 2;
  string suggested_content = 3;
}